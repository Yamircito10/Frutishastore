<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login - LUDAVA</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: var(--fondo); }
    .login-header { text-align: center; margin-bottom: 20px; }
    .login-header h1 { font-size: 2.2rem; margin-bottom: 5px; color: var(--principal); }
    .login-header p { color: #888; font-size: 0.9rem; }
    .login-container { width: 100%; max-width: 320px; background: white; padding: 30px 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; border-top: 5px solid var(--principal); }
    .input-grupo { margin-bottom: 15px; text-align: left; }
    .input-grupo label { display: block; font-size: 0.85rem; color: var(--texto); margin-bottom: 5px; font-weight: bold; }
    .login-container input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; transition: border-color 0.3s; }
    .login-container input:focus { border-color: var(--principal); outline: none; box-shadow: 0 0 5px rgba(216, 27, 96, 0.3); }
    .btn-login { width: 100%; padding: 14px; background-color: var(--principal); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s ease; margin-top: 10px; }
    .btn-login:hover { opacity: 0.9; }
  </style>
</head>
<body>

<div class="login-header">
  <h1>✨ LUDAVA</h1>
  <p>Acceso Seguro en la Nube</p>
</div>

<div class="login-container">
  <div class="input-grupo">
    <label for="correo">✉️ Correo Oficial</label>
    <input type="email" id="correo" placeholder="Ej: admin@ludava.com" autocomplete="username">
  </div>
  
  <div class="input-grupo">
    <label for="contrasena">🔑 Contraseña</label>
    <input type="password" id="contrasena" placeholder="Tu contraseña" autocomplete="current-password" onkeypress="verificarEnter(event)">
  </div>
  
  <button class="btn-login" onclick="iniciarSesion()">Ingresar al Sistema</button>
  
  <button onclick="window.location.href='index.html'" style="background: transparent; color: #888; border: none; margin-top: 15px; text-decoration: underline; cursor: pointer; font-size: 12px;">🔙 Volver a la tienda</button>
</div>

<!-- Scripts de Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBtNWOs53cdTm0SYUZe_qCQb4OC-_VdcMQ",
    authDomain: "frutisha-store.firebaseapp.com",
    projectId: "inventario-ab270",
    storageBucket: "frutisha-store.appspot.com",
    messagingSenderId: "15388676345",
    appId: "1:15388676345:web:72c8e22a2aece1d4151228"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function iniciarSesion() {
    const email = document.getElementById('correo').value.trim();
    const pass = document.getElementById('contrasena').value.trim();
    const btn = document.querySelector('.btn-login');

    if(!email || !pass) { alert("⚠️ Llena ambos campos."); return; }

    btn.innerText = "Validando..."; btn.disabled = true;

    // Conexión real a la nube
    auth.signInWithEmailAndPassword(email, pass)
      .then((userCredential) => {
        // Credencial aceptada
        localStorage.setItem("usuarioActivo", "CEO LUDAVA");
        localStorage.setItem("rolActivo", "admin");
        window.location.href = 'index.html';
      })
      .catch((error) => {
        // Intruso detectado
        alert("❌ Correo o contraseña incorrectos.");
        btn.innerText = "Ingresar al Sistema";
        btn.disabled = false;
        document.getElementById('contrasena').value = ""; 
      });
  }

  function verificarEnter(evento) { if (evento.key === "Enter") iniciarSesion(); }
</script>

</body>
</html>
