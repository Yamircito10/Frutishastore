    body {

      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--fondo);
      padding: 20px;
    }
    .import-container {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .btn-importar {
      background: #27ae60;
      color: white;
      border: none;
      padding: 15px;
      font-size: 1.2rem;
      border-radius: 10px;
      font-weight: bold;
      width: 100%;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }
    .btn-importar:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }
    .btn-volver {
      background: #f0f0f0;
      color: #333;
      border: none;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
    #log {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #666;
      text-align: left;
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      height: 100px;
      overflow-y: auto;
      border: 1px solid #ddd;
    }
  </style>
</head>

    ];

    async function importarInventario() {
      const btn = document.getElementById("btn-subir");
      btn.disabled = true;
      btn.innerText = "⏳ Subiendo...";
      document.getElementById("log").innerHTML = ""; // Limpiar log previo

      try {
        // MEJORA: Usar Batch para enviar todo rápido y de golpe
        const batch = db.batch();
        const collectionRef = db.collection("inventario");

        inventario.forEach((prenda) => {
          // 1. Asignar un stockTalla inicial (ej: 5 por talla) para que el sistema funcione
          const stockPorTalla = 5; 
          
          let stockTotalCalculado = 0;
          const tallasAjustadas = prenda.tallas.map(t => {
            stockTotalCalculado += stockPorTalla;
            return {
              talla: t.talla,
              precio: t.precio,
              stockTalla: stockPorTalla
            };
          });

          // 2. Preparar el documento
          const nuevoDocRef = collectionRef.doc(); // Crea un ID único
          batch.set(nuevoDocRef, {
            nombre: prenda.nombre,
            precio: prenda.precio,
            stock: stockTotalCalculado,
            tallas: tallasAjustadas
          });

          logMsg(`Preparando: ${prenda.nombre} (Stock: ${stockTotalCalculado})`);
        });

        logMsg("Enviando paquete a Firebase...");
        
        // 3. Ejecutar la subida
        await batch.commit();
        
        logMsg("✅ ¡Subida completada con éxito!");
        alert("✅ Inventario importado correctamente. Tienes 5 unidades de stock por talla.");
        
        btn.innerText = "✅ Finalizado";

      } catch (error) {
        console.error("❌ Error en la importación:", error);
        logMsg("❌ Error: " + error.message);
        btn.innerText = "⚠️ Error. Intentar de nuevo";
        btn.disabled = false;
      }
    }
  </script>

</html>
